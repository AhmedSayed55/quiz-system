  <!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Animated Login Form | CodingNepal</title>
    <link rel="stylesheet" href="">
  </head>
  <body>
    <div class="center">
      <h1>Login</h1>
      <form (ngSubmit)="onSubmit()" #f="ngForm">
        <div class="txt_field">
          <input type="text"ngModel name="username" #username="ngModel" class="form-control" required email>
          <span></span>
          <label>Username</label>
        </div>
        <div class="txt_field">
          <input type="password"  ngModel name="password" class="form-control" required/>
          <span></span>
          <label>Password</label>
        </div>
        <button class="button_style" type="submit" value="Login">login</button>
        <div class="signup_link">
          Not a member? <a routerLink="../register">Signup</a>
        </div>
      </form>
    </div>

  </body>
</html>
