
<h1 style="text-align: center;">Quiz</h1>
<label>enter your name</label>
 <input type="text" id="username" class="form-control" [(ngModel)]="userName" />
 <button  (click)="addNewStudentWithSpecificID()" >ok</button>



<div class="card" style="margin-left: 10%;margin-right: 10%;" *ngFor="let addQuiz of all_questions " >
  <div class="card-header headerofcard" >
   <p> question</p>
  </div>
  <div class="card-body" >
    <p class="card-text">{{addQuiz.question}}</p>
     <!-- <input type="text" id="username" class="form-control" [(ngModel)]="ans" /> -->
    <button class="btn1" style=" margin-left: 40%;background-color: green;" value={{addQuiz.answer}} (click)="addNewDocumentTrue();updategradetrue(addQuiz.answer)" >true</button>
   <button class="btn1" style="float: right; margin-right: 40%;background-color: red;"value={{addQuiz.answer}}  (click)="addNewDocumentFalse();updategradefalse(addQuiz.answer)" >false</button>
  </div>

</div>

<div>
  <button routerLink="../student-page"  (click)="updatestudentcountDocument(this.submitname!)">submit</button>
</div>
