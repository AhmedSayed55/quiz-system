<!DOCTYPE html>
<html lang="en">
<head>
  <title>Professor Page</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
      <div>
        <h1>Professor Page</h1> <br>

        <button class="start" [routerLink]="['/','add-quiz']">add quiz</button>
      </div >
      <div class="flex">
      <div class="form-group">
        <label for="dId">enter the quiz id to delete</label>
        <input type="text" class="form-control" [(ngModel)]="ref" />

      </div>
      <button (click)="delete()" class="btn btn-danger ml"  type="button">Delete</button>
    </div>

    <div  class="quiz"  *ngFor="let quizzes of all_users">
      <p class="quizname"> {{ quizzes.quizName }} <br>{{ quizzes.courseName }}</p>
      <div>
      <button class="start" routerLink="../active-students"  value={{quizzes.quizName}} id={{quizzes.quizName}} class="start"  (click)="sendQuizName(this.quizzes.quizName)">Follow students</button>
      </div>
    </div>

    </div>
    <div class="card-body" >

        <div   >
          <button class="start" >Follow student 1</button>

    </div>
  </div><br><br> -->

</body>
</html>
